# The single source of truth for the database versions every claim is verified against.
# Used identically by local dev and CI.
services:
  postgres:
    image: postgres:18.4
    # Chapter 6 (two-phase commit) needs prepared transactions, which are off by default.
    command: -c max_prepared_transactions=10
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      # 54321 to avoid colliding with a locally installed PostgreSQL on 5432.
      - "54321:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 15
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: mysql
      MYSQL_DATABASE: app
    ports:
      # Same convention as 54321: off the default port, no clash with a local MySQL on 3306.
      - "33061:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pmysql"]
      interval: 2s
      timeout: 2s
      # First boot initializes the data directory — slower than postgres.
      retries: 30
