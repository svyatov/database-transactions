# A green run means: every scenario passed (TypeScript and Python, both databases) and
# every transcript on the site was just reproduced against the database versions pinned
# in docker-compose.yml.
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Only re-prove against the databases when something that can change the proof changed.
      # Prose-only edits skip the ~135s×2 DB suite; the site still builds and deploys from the
      # committed transcripts/ledger/llms files. Default is to run the heavy steps — a path is
      # skipped only when the whole change stays outside this list.
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            db:
              - 'scenarios/**'
              - 'harness/**'
              - 'python/**'
              - 'tests/**'
              - 'scripts/**'
              - 'docker-compose.yml'
              - 'package.json'
              - 'bun.lock'
              - 'tsconfig.json'
              - 'biome.json'
              - '.bun-version'
              - '.github/workflows/ci.yml'
              - 'docs/**/parts/**'
              - 'docs/public/**'
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version # single source of truth with local dev
      - run: bun install --frozen-lockfile
      # Static gates first — fail fast before spinning up databases.
      - name: Type-check
        run: bunx tsc --noEmit
      - name: Lint and format check
        run: bunx biome ci .
      # docs:build strips the #fragment before checking a link — this checks the fragment.
      - name: Check every internal anchor link resolves
        run: bun run docs:anchors
      # Same compose file as local dev — one source of truth for the DB versions and config.
      - if: steps.filter.outputs.db == 'true'
        run: docker compose up -d --wait
      - name: Run every scenario, assert every claim
        if: steps.filter.outputs.db == 'true'
        run: bun test
      - name: Regenerate transcripts and fail on drift
        if: steps.filter.outputs.db == 'true'
        run: |
          bun run gen
          git diff --exit-code docs
      - if: steps.filter.outputs.db == 'true'
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
      - name: Cross-driver check — same claims through psycopg + PyMySQL
        if: steps.filter.outputs.db == 'true'
        run: |
          uv sync --directory python
          uv run --directory python ruff check
          uv run --directory python pytest
      - run: bun run docs:build
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/.vitepress/dist

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
