# A green run means: every scenario passed and every transcript on the site was just
# reproduced against the PostgreSQL version pinned in docker-compose.yml.
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      # Same compose file as local dev — one source of truth for the PG version and config.
      - run: docker compose up -d --wait
      - run: bun install --frozen-lockfile
      - name: Run every scenario, assert every claim
        run: bun test
      - name: Regenerate transcripts and fail on drift
        run: |
          bun run gen
          git diff --exit-code docs
      - run: bun run docs:build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
