title: Nested savepoints and RELEASE
claim: >-
  Rolling back to an outer savepoint discards inner savepoints along with
  their work; RELEASE keeps the changes but forfeits the rollback point.
setup: |
  CREATE TABLE steps (n int PRIMARY KEY);
sessions: [A]
steps:
  - A: BEGIN
  - A: INSERT INTO steps VALUES (1)
  - A: SAVEPOINT outer_sp
  - A: INSERT INTO steps VALUES (2)
  - A: SAVEPOINT inner_sp
  - A: INSERT INTO steps VALUES (3)

  - note: Rolling back to the OUTER savepoint discards rows 2 and 3 — and inner_sp itself.
  - A: ROLLBACK TO SAVEPOINT outer_sp

  - A.fails: ROLLBACK TO SAVEPOINT inner_sp
    error: "3B001"
    comment: no such savepoint — it was destroyed by the outer rollback

  - A: ROLLBACK TO SAVEPOINT outer_sp
    comment: recover from that error, same trick as before

  - note: RELEASE keeps the work done after the savepoint, but you can no longer rewind to it.
  - A: INSERT INTO steps VALUES (4)
  - A: RELEASE SAVEPOINT outer_sp
  - A: COMMIT

  - A: SELECT n FROM steps ORDER BY n
    expect: [{ n: 1 }, { n: 4 }]
