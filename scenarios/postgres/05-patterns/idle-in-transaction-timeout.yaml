title: The idle-in-transaction timeout, from both sides
claim: >-
  A session that goes idle mid-transaction (the classic ORM failure mode) is
  killed by idle_in_transaction_session_timeout: its work is rolled back and
  the app discovers the corpse on its next statement.
setup: |
  CREATE TABLE orders (id int PRIMARY KEY, status text NOT NULL);
  INSERT INTO orders VALUES (1, 'pending');
sessions: [A, M]
steps:
  - note: An ORM opens a transaction, updates a row… and then the request handler calls a slow external API.
  - A: SET idle_in_transaction_session_timeout = '500ms'
  - A: BEGIN
  - A: UPDATE orders SET status = 'paid' WHERE id = 1

  - note: "From the outside this is the classic pathology — a session holding locks while doing nothing:"
  - M: SELECT state FROM pg_stat_activity WHERE application_name = 'A'
    expect: [{ state: "idle in transaction" }]

  - note: …the API call drags on past the timeout. The server kills the session (FATAL 25P03).
  - sleep: 1500 # the slow API call

  - M: SELECT state FROM pg_stat_activity WHERE application_name = 'A'
    expect: []
    comment: the backend is gone

  - note: "The app finds out only when it finally comes back to commit:"
  - A.fails: COMMIT
    error: ["25P03", "ERR_POSTGRES_CONNECTION_CLOSED"] # psycopg sees the FATAL's SQLSTATE; Bun.sql only notices the closed socket

  - M: SELECT status FROM orders WHERE id = 1
    expect: [{ status: "pending" }]
    comment: the UPDATE was rolled back with the killed session
