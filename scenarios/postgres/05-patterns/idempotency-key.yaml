title: "Idempotency keys: charging once, no matter how many retries"
claim: >-
  INSERT ... ON CONFLICT DO NOTHING RETURNING on an idempotency key makes
  retries safe: the first request charges, every retry — even one racing the
  original in flight — gets 0 rows back and charges nothing.
setup: |
  CREATE TABLE payments (idempotency_key text PRIMARY KEY, amount int NOT NULL);
  CREATE TABLE accounts (id int PRIMARY KEY, balance int NOT NULL);
  INSERT INTO accounts VALUES (1, 100);
sessions: [A, B]
steps:
  - note: The client sends 'charge $30' with idempotency key req-42. Server A processes it.
  - A: BEGIN
  - A: |-
      INSERT INTO payments VALUES ('req-42', 30)
      ON CONFLICT (idempotency_key) DO NOTHING
      RETURNING idempotency_key
    expect: [{}]
    comment: "a row came back: this key is new — do the work"
  - A: UPDATE accounts SET balance = balance - 30 WHERE id = 1
  - A: COMMIT

  - note: The response is lost in the network. The client retries the same request; server B picks it up.
  - B: BEGIN
  - B: |-
      INSERT INTO payments VALUES ('req-42', 30)
      ON CONFLICT (idempotency_key) DO NOTHING
      RETURNING idempotency_key
    expect: []
    comment: "0 rows: already processed — skip the charge, return the stored result"
  - B: SELECT amount FROM payments WHERE idempotency_key = 'req-42'
    expect: [{ amount: 30 }]
  - B: COMMIT

  - A: SELECT balance FROM accounts WHERE id = 1
    expect: [{ balance: 70 }]
    comment: charged exactly once

  - note: "The nasty case: the retry arrives while the original is still in flight, uncommitted."
  - A: BEGIN
  - A: |-
      INSERT INTO payments VALUES ('req-99', 25)
      ON CONFLICT (idempotency_key) DO NOTHING
      RETURNING idempotency_key
  - A: UPDATE accounts SET balance = balance - 25 WHERE id = 1

  - B: |-
      INSERT INTO payments VALUES ('req-99', 25)
      ON CONFLICT (idempotency_key) DO NOTHING
      RETURNING idempotency_key
    blocks: p1

  - note: The unique index parks the retry until the original decides. A commits — the retry absorbs to 0 rows.
  - A: COMMIT
  - success: p1
    expect: []
  - note: Even the in-flight duplicate cannot double-charge.

  - A: SELECT balance FROM accounts WHERE id = 1
    expect: [{ balance: 45 }]
    comment: "100 - 30 - 25: every charge applied exactly once"
