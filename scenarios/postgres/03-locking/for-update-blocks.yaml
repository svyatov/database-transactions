title: SELECT FOR UPDATE blocks writers, never readers
claim: >-
  A row locked with SELECT FOR UPDATE can still be read by everyone, but any
  write to it waits until the locking transaction ends.
setup: |
  CREATE TABLE accounts (id int PRIMARY KEY, owner text NOT NULL, balance int NOT NULL);
  INSERT INTO accounts VALUES (1, 'alice', 100);
sessions: [A, B]
steps:
  - A: BEGIN
  - A: SELECT * FROM accounts WHERE id = 1 FOR UPDATE

  - note: Reading the locked row costs B nothing — MVCC readers don't take row locks.
  - B: SELECT balance FROM accounts WHERE id = 1
    expect: [{ balance: 100 }]

  - note: >-
      Writing to it is another story: B's UPDATE must wait for A.
  - B: UPDATE accounts SET balance = balance - 10 WHERE id = 1
    blocks: p1

  - A: UPDATE accounts SET balance = 150 WHERE id = 1
  - A: COMMIT
    comment: releases the row lock

  - success: p1
  - B: SELECT balance FROM accounts WHERE id = 1
    expect: [{ balance: 140 }]
    comment: B's -10 applied on top of A's committed 150
