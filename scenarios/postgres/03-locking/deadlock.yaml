title: "Deadlock: two transactions, opposite lock order"
claim: >-
  Two transactions locking the same rows in opposite order deadlock;
  PostgreSQL detects the cycle and aborts one of them with SQLSTATE 40P01 so
  the other can finish.
setup: |
  CREATE TABLE accounts (id int PRIMARY KEY, owner text NOT NULL, balance int NOT NULL);
  INSERT INTO accounts VALUES (1, 'alice', 100), (2, 'bob', 100);
sessions: [A, B]
steps:
  - A: SET deadlock_timeout = '10s'
    comment: >-
      In production the victim is effectively arbitrary — whichever waiter's
      deadlock_timeout (default 1s) fires first runs the check and aborts
      itself. We pin it here so the transcript is reproducible: B checks first.
  - B: SET deadlock_timeout = '50ms'

  - note: A transfers 10 from alice to bob; B transfers 25 from bob to alice.
  - A: BEGIN
  - A: UPDATE accounts SET balance = balance - 10 WHERE id = 1
    comment: A locks alice

  - B: BEGIN
  - B: UPDATE accounts SET balance = balance - 25 WHERE id = 2
    comment: B locks bob

  - note: A now needs bob's row (B has it) — it waits.
  - A: UPDATE accounts SET balance = balance + 10 WHERE id = 2
    blocks: p1

  - note: >-
      B now needs alice's row (A has it). A waits for B, B waits for A: a cycle.
  - B.fails: UPDATE accounts SET balance = balance + 25 WHERE id = 1
    error: "40P01"
    comment: deadlock_detected — B is aborted…

  - note: The victim's abort frees bob's row, so A's stuck UPDATE completes.
  - success: p1
  - A: COMMIT
  - B: ROLLBACK

  - A: SELECT owner, balance FROM accounts ORDER BY id
    expect: [{ owner: alice, balance: 90 }, { owner: bob, balance: 110 }]
    comment: A's transfer survived; B's evaporated — retry it
