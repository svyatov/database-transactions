title: "Deadlock avoidance: lock rows in a consistent order"
claim: >-
  The same two opposite-direction transfers cannot deadlock if both
  transactions lock the rows in the same (id) order first — the second simply
  waits its turn.
setup: |
  CREATE TABLE accounts (id int PRIMARY KEY, owner text NOT NULL, balance int NOT NULL);
  INSERT INTO accounts VALUES (1, 'alice', 100), (2, 'bob', 100);
sessions: [A, B]
steps:
  - note: Both transfers grab *all* their row locks up front, ordered by id.
  - A: BEGIN
  - A: SELECT id FROM accounts WHERE id IN (1, 2) ORDER BY id FOR UPDATE
    tl: SELECT id IN (1,2) … FOR UPDATE → locks both, in id order

  - B: BEGIN
  - B: SELECT id FROM accounts WHERE id IN (1, 2) ORDER BY id FOR UPDATE
    blocks: p1
    tl: SELECT id IN (1,2) … FOR UPDATE

  - note: >-
      No cycle is possible: B parks at the first row and holds nothing A needs.
  - A: UPDATE accounts SET balance = balance - 10 WHERE id = 1
  - A: UPDATE accounts SET balance = balance + 10 WHERE id = 2
  - A: COMMIT
    tl: COMMIT → releases both

  - success: p1
  - B: UPDATE accounts SET balance = balance - 25 WHERE id = 2
  - B: UPDATE accounts SET balance = balance + 25 WHERE id = 1
  - B: COMMIT

  - A: SELECT owner, balance FROM accounts ORDER BY id
    expect: [{ owner: alice, balance: 115 }, { owner: bob, balance: 85 }]
    comment: both transfers landed — same workload, zero deadlocks
