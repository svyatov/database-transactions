title: Who is blocking whom
claim: >-
  One join on pg_stat_activity + pg_blocking_pids() names the blocker, shows
  that it's sitting idle in transaction, and shows the last statement it ran —
  and pg_terminate_backend() drains the queue.
setup: |
  CREATE TABLE accounts (id int PRIMARY KEY, balance int NOT NULL);
  INSERT INTO accounts VALUES (1, 100);
sessions: [A, B, M]
steps:
  - note: A updates a row and then… goes to lunch. The transaction stays open.
  - A: BEGIN
  - A: UPDATE accounts SET balance = 200 WHERE id = 1
    tl: UPDATE, then goes to lunch (idle in txn)

  - B: UPDATE accounts SET balance = 300 WHERE id = 1
    blocks: p1
    tl: UPDATE balance = 300

  - note: "Someone pages you: 'updates are hanging'. This is the query you paste:"
  - M: |
      SELECT waiter.application_name AS waiter,
             waiter.query            AS waiting_query,
             blocker.application_name AS blocker,
             blocker.state             AS blocker_state,
             blocker.query             AS blocker_last_query
      FROM pg_stat_activity waiter
      JOIN pg_stat_activity blocker ON blocker.pid = ANY (pg_blocking_pids(waiter.pid))
      WHERE waiter.wait_event_type = 'Lock'
    tl: who blocks whom? → B waits on idle A
    expect:
      - waiter: B
        waiting_query: UPDATE accounts SET balance = 300 WHERE id = 1
        blocker: A
        blocker_state: idle in transaction
        blocker_last_query: UPDATE accounts SET balance = 200 WHERE id = 1

  - note: "The culprit isn't running anything — it's IDLE, holding locks. The fix is blunt:"
  - M: |
      SELECT pg_terminate_backend(pid) AS terminated
      FROM pg_stat_activity WHERE application_name = 'A'
    expect: [{ terminated: true }]
    tl: pg_terminate_backend(A)

  - note: A's transaction dies and rolls back; B gets the lock and finishes at last.
  - success: p1
    affected: 1
  - B: SELECT balance FROM accounts WHERE id = 1
    expect: [{ balance: 300 }]
    comment: A's 200 rolled back with its termination; B's 300 committed
