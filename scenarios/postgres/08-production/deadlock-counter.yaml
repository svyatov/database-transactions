title: Deadlocks leave a permanent trace
claim: >-
  Every deadlock increments pg_stat_database.deadlocks — a counter you can
  alert on even when nobody was watching the error logs.
setup: |
  CREATE TABLE accounts (id int PRIMARY KEY, balance int NOT NULL);
  INSERT INTO accounts VALUES (1, 100), (2, 100);
  -- Snapshot the cumulative counter before this scenario's deadlock, so the
  -- transcript can show a clean delta instead of a lifetime total.
  CREATE TABLE stats_before AS
    SELECT deadlocks FROM pg_stat_database WHERE datname = current_database();
sessions: [A, B, M]
steps:
  - A: SET deadlock_timeout = '10s'
    comment: Pin the victim, as in the chapter-3 deadlock lesson, so the transcript is reproducible.
  - B: SET deadlock_timeout = '50ms'

  - note: "The classic: A and B lock the same two rows in opposite order."
  - A: BEGIN
  - A: UPDATE accounts SET balance = balance - 10 WHERE id = 1
  - B: BEGIN
  - B: UPDATE accounts SET balance = balance - 25 WHERE id = 2

  - A: UPDATE accounts SET balance = balance + 10 WHERE id = 2
    blocks: p1
  - B.fails: UPDATE accounts SET balance = balance + 25 WHERE id = 1
    error: "40P01"
    comment: deadlock_detected
  - success: p1
  - A: COMMIT
  - B: ROLLBACK

  - note: "The app retried, the users never noticed. But the database remembers:"
  - B: SELECT pg_stat_force_next_flush()
  - M: |
      SELECT (d.deadlocks - s.deadlocks)::int AS new_deadlocks
      FROM pg_stat_database d, stats_before s
      WHERE d.datname = current_database()
    expect: [{ new_deadlocks: 1 }]
