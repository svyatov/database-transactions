title: SERIALIZABLE catches write skew
claim: >-
  The exact interleaving that breaks the invariant under REPEATABLE READ fails
  with SQLSTATE 40001 under SERIALIZABLE — one transaction commits, the other
  must retry.
setup: |
  CREATE TABLE doctors (name text PRIMARY KEY, on_call boolean NOT NULL);
  INSERT INTO doctors VALUES ('alice', true), ('bob', true);
sessions: [A, B]
steps:
  - note: Same story, same statements, same order — only the isolation level differs.
  - A: BEGIN ISOLATION LEVEL SERIALIZABLE
  - B: BEGIN ISOLATION LEVEL SERIALIZABLE

  - A: SELECT count(*)::int AS on_call FROM doctors WHERE on_call
    expect: [{ on_call: 2 }]
  - B: SELECT count(*)::int AS on_call FROM doctors WHERE on_call
    expect: [{ on_call: 2 }]

  - A: UPDATE doctors SET on_call = false WHERE name = 'alice'
  - B: UPDATE doctors SET on_call = false WHERE name = 'bob'

  - note: The first committer wins. The second cannot be serialized against it and is aborted.
  - A: COMMIT
  - B.fails: COMMIT
    error: "40001"
    comment: serialization_failure

  - A: SELECT count(*)::int AS on_call FROM doctors WHERE on_call
    expect: [{ on_call: 1 }]
    comment: the invariant survived

  - note: >-
      B's job is to retry. On retry it would see only one doctor on call — and
      refuse the night off.
