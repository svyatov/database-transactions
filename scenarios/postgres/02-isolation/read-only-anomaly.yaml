title: The read-only anomaly (and how SERIALIZABLE stops it)
claim: >-
  At REPEATABLE READ, even a read-only transaction can observe a state no
  serial execution could produce; at SERIALIZABLE, PostgreSQL aborts the
  offending writer instead (SQLSTATE 40001).
setup: |
  CREATE TABLE control  (deposit_no int NOT NULL);
  CREATE TABLE receipts (receipt_no int PRIMARY KEY, deposit_no int NOT NULL, amount int NOT NULL);
  INSERT INTO control  VALUES (1);
  INSERT INTO receipts VALUES (1, 1, 100), (2, 1, 200);
sessions: [Cashier, Closer, Report]
steps:
  - note: >-
      A bank tracks receipts per deposit batch. The cashier files a receipt
      into the current batch (1) — slowly.
  - Cashier: BEGIN ISOLATION LEVEL REPEATABLE READ
  - Cashier: SELECT deposit_no FROM control
    expect: [{ deposit_no: 1 }]
    tl: SELECT deposit_no → 1 (current batch)
  - Cashier: INSERT INTO receipts VALUES (3, 1, 400)
    tl: INSERT receipt 3 into batch 1 (slow, uncommitted)

  - note: >-
      Meanwhile the closer moves the bank to batch 2 — from now on, batch 1 is
      supposedly complete.
  - Closer: BEGIN ISOLATION LEVEL REPEATABLE READ
  - Closer: UPDATE control SET deposit_no = 2
    tl: UPDATE deposit_no = 2 (batch 1 closed)
  - Closer: COMMIT
    tl: COMMIT

  - note: An auditor prints the report for the closed batch 1.
  - Report: BEGIN ISOLATION LEVEL REPEATABLE READ
  - Report: SELECT deposit_no FROM control
    expect: [{ deposit_no: 2 }]
    comment: batch 1 is closed…
    tl: SELECT deposit_no → 2 ← batch 1 is closed
  - Report: SELECT receipt_no, amount FROM receipts WHERE deposit_no = 1 ORDER BY receipt_no
    expect: [{}, {}]
    comment: …and contains receipts 1 and 2, total 300. The report is published.
    tl: SELECT batch 1 → receipts 1, 2 (total 300) ← report published
  - Report: COMMIT
    tl: COMMIT

  - note: >-
      Now the cashier's receipt lands — in batch 1, which the report just
      declared final.
  - Cashier: COMMIT
    tl: COMMIT ← receipt 3 lands in the closed batch 1
  - Report: SELECT receipt_no, amount FROM receipts WHERE deposit_no = 1 ORDER BY receipt_no
    expect: [{}, {}, {}]
    comment: "the published report was wrong: no serial order of these three transactions produces it"
    tl: re-read batch 1 → 3 receipts ← the published report was wrong

  - note: >-
      Rewind and replay the exact same interleaving — all three transactions
      SERIALIZABLE.
  - Report: DELETE FROM receipts WHERE receipt_no = 3
  - Report: UPDATE control SET deposit_no = 1

  - Cashier: BEGIN ISOLATION LEVEL SERIALIZABLE
  - Cashier: SELECT deposit_no FROM control
  - Cashier: INSERT INTO receipts VALUES (3, 1, 400)

  - Closer: BEGIN ISOLATION LEVEL SERIALIZABLE
  - Closer: UPDATE control SET deposit_no = 2
  - Closer: COMMIT

  - Report: BEGIN ISOLATION LEVEL SERIALIZABLE
  - Report: SELECT deposit_no FROM control
  - Report: SELECT receipt_no, amount FROM receipts WHERE deposit_no = 1 ORDER BY receipt_no
    expect: [{}, {}]
  - Report: COMMIT
    comment: the report itself commits fine —

  - note: >-
      — because SERIALIZABLE protects it by aborting the transaction that
      would invalidate it: the cashier.
  - Cashier.fails: COMMIT
    error: "40001"

  - Report: SELECT receipt_no, amount FROM receipts WHERE deposit_no = 1 ORDER BY receipt_no
    expect: [{}, {}]
    comment: batch 1 still matches the published report; the cashier retries into batch 2
