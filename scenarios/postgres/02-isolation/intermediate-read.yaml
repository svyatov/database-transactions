title: Readers never see intermediate states
claim: >-
  A transaction that changes a value twice exposes neither draft to other
  transactions (Adya's G1b, "intermediate read"): readers see the old value
  until commit, then only the final one.
setup: |
  CREATE TABLE accounts (id int PRIMARY KEY, owner text NOT NULL, balance int NOT NULL);
  INSERT INTO accounts VALUES (1, 'alice', 100);
sessions: [A, B]
steps:
  - A: BEGIN
  - A: UPDATE accounts SET balance = 999 WHERE id = 1
    comment: a working draft — A isn't done yet
    tl: UPDATE balance = 999 (draft, uncommitted)

  - B: SELECT balance FROM accounts WHERE id = 1
    expect: [{ balance: 100 }]
    comment: the draft 999 is invisible
    tl: SELECT → 100 ← draft 999 invisible

  - A: UPDATE accounts SET balance = 110 WHERE id = 1
    comment: A settles on the final value…
    tl: UPDATE balance = 110 (final value)
  - A: COMMIT
    tl: COMMIT

  - B: SELECT balance FROM accounts WHERE id = 1
    expect: [{ balance: 110 }]
    tl: SELECT → 110 ← only the final value, never 999

  - note: >-
      To every other transaction, the balance went 100 → 110 in one step.
      The intermediate 999 never existed outside A.
