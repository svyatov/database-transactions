title: Non-repeatable read under READ COMMITTED
claim: >-
  At READ COMMITTED, a transaction can read two different values for the same
  row — other transactions' commits become visible between its statements.
setup: |
  CREATE TABLE accounts (id int PRIMARY KEY, owner text NOT NULL, balance int NOT NULL);
  INSERT INTO accounts VALUES (1, 'alice', 100);
sessions: [A, B]
steps:
  - A: BEGIN ISOLATION LEVEL READ COMMITTED
  - A: SELECT balance FROM accounts WHERE id = 1
    expect: [{ balance: 100 }]
    tl: SELECT balance → 100

  - note: While A's transaction is still open, B updates the row and commits.
  - B: UPDATE accounts SET balance = 200 WHERE id = 1
    tl: UPDATE balance = 200 (autocommit)
  - A: SELECT balance FROM accounts WHERE id = 1
    expect: [{ balance: 200 }]
    comment: same query, same transaction — different answer
    tl: SELECT balance → 200 — same txn, different answer
  - A: COMMIT

  - note: >-
      Readers never block — but writers do. The same interleaving with UPDATEs
      makes B wait for A's row lock.
  - A: BEGIN
  - A: UPDATE accounts SET balance = 300 WHERE id = 1
  - B: UPDATE accounts SET balance = 400 WHERE id = 1
    blocks: p1
  - A: COMMIT
    comment: releases the row lock
  - success: p1
  - B: SELECT balance FROM accounts WHERE id = 1
    expect: [{ balance: 400 }]
    comment: B's write landed on top of A's committed 300
