title: REPEATABLE READ refuses to overwrite concurrent changes
claim: >-
  A REPEATABLE READ transaction that tries to UPDATE a row modified since its
  snapshot fails with SQLSTATE 40001 — immediately if the change is committed,
  or after waiting if it isn't.
setup: |
  CREATE TABLE accounts (id int PRIMARY KEY, owner text NOT NULL, balance int NOT NULL);
  INSERT INTO accounts VALUES (1, 'alice', 100);
sessions: [A, B]
steps:
  - A: BEGIN ISOLATION LEVEL REPEATABLE READ
  - A: SELECT balance FROM accounts WHERE id = 1
    expect: [{ balance: 100 }]
    comment: snapshot taken

  - note: >-
      B commits a change. A can keep READING its stale snapshot — but writing
      that row is refused.
  - B: UPDATE accounts SET balance = 150 WHERE id = 1
  - A: SELECT balance FROM accounts WHERE id = 1
    expect: [{ balance: 100 }]
  - A.fails: UPDATE accounts SET balance = 200 WHERE id = 1
    error: "40001"
    comment: serialization_failure — retry the whole transaction
  - A: ROLLBACK

  - note: >-
      If the competing write is NOT yet committed, the outcome is decided
      later: A first waits on the row lock…
  - A: BEGIN ISOLATION LEVEL REPEATABLE READ
  - A: SELECT balance FROM accounts WHERE id = 1
    comment: snapshot taken

  - B: BEGIN
  - B: UPDATE accounts SET balance = 300 WHERE id = 1
  - A: UPDATE accounts SET balance = 999 WHERE id = 1
    blocks: p1

  - note: >-
      …and fails with 40001 the moment B commits. (Had B rolled back, A would
      have proceeded.)
  - B: COMMIT
  - failure: p1
    error: "40001"
  - A: ROLLBACK
