title: No circular information flow
claim: >-
  Two concurrent transactions cannot read each other's uncommitted writes
  (Adya's G1c, "circular information flow"): each sees the pre-existing value,
  as one serial order or the other would dictate.
setup: |
  CREATE TABLE accounts (id int PRIMARY KEY, owner text NOT NULL, balance int NOT NULL);
  INSERT INTO accounts VALUES (1, 'alice', 100), (2, 'bob', 100);
sessions: [A, B]
steps:
  - note: >-
      A adjusts alice's balance while B adjusts bob's — then each peeks at the
      other's row. If both saw the other's uncommitted write, information would
      flow in a circle: A → B → A. No serial order can do that.
  - A: BEGIN
  - B: BEGIN
  - A: UPDATE accounts SET balance = 111 WHERE id = 1
  - B: UPDATE accounts SET balance = 222 WHERE id = 2

  - A: SELECT balance FROM accounts WHERE id = 2
    expect: [{ balance: 100 }]
    comment: B's uncommitted 222 is invisible to A
  - B: SELECT balance FROM accounts WHERE id = 1
    expect: [{ balance: 100 }]
    comment: and A's uncommitted 111 is invisible to B

  - A: COMMIT
  - B: COMMIT

  - A: SELECT id, balance FROM accounts ORDER BY id
    expect: [{ id: 1, balance: 111 }, { id: 2, balance: 222 }]
    comment: both writes landed — but neither transaction ever saw the other's
