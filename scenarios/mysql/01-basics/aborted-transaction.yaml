title: An error does NOT abort the transaction
claim: >-
  After an error inside a transaction, MySQL keeps the transaction alive —
  only the failed statement is rolled back, and everything else commits
  normally.
setup: |
  CREATE TABLE items (id int PRIMARY KEY, name varchar(50) NOT NULL UNIQUE);
  INSERT INTO items VALUES (1, 'widget');
sessions: [A]
steps:
  - A: BEGIN
  - A: INSERT INTO items VALUES (2, 'gadget')

  - A.fails: INSERT INTO items VALUES (3, 'widget')
    error: "1062"
    comment: ER_DUP_ENTRY

  - note: PostgreSQL would now refuse every statement until ROLLBACK. MySQL just carries on.
  - A: INSERT INTO items VALUES (3, 'doohickey')
  - A: COMMIT

  - A: SELECT id, name FROM items ORDER BY id
    expect:
      - { id: 1, name: widget }
      - { id: 2, name: gadget }
      - { id: 3, name: doohickey }
    comment: survived the error in the middle
