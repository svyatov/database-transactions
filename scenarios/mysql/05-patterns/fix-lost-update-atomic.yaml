title: "Fixing lost updates #1: compute in SQL, not in the app"
claim: >-
  UPDATE ... SET balance = balance + 10 reads and writes in one statement: the
  second writer waits for the first and stacks on top — both deposits survive,
  at any isolation level.
setup: |
  CREATE TABLE accounts (id int PRIMARY KEY, owner varchar(20) NOT NULL, balance int NOT NULL);
  INSERT INTO accounts VALUES (1, 'alice', 100);
sessions: [A, B]
steps:
  - note: Same two +10 deposits that lost an update in chapter 2 — but the math moved into the UPDATE itself.
  - A: BEGIN
  - A: UPDATE accounts SET balance = balance + 10 WHERE id = 1
  - A: SELECT balance FROM accounts WHERE id = 1
    expect: [{ balance: 110 }]

  - B: BEGIN
  - B: UPDATE accounts SET balance = balance + 10 WHERE id = 1
    blocks: p1

  - note: "No stale read exists to write back: B waits for A's row lock, then computes from the committed 110."
  - A: COMMIT
  - success: p1
  - B: SELECT balance FROM accounts WHERE id = 1
    expect: [{ balance: 120 }]
  - B: COMMIT

  - A: SELECT balance FROM accounts WHERE id = 1
    expect: [{ balance: 120 }]
    comment: both deposits survived
