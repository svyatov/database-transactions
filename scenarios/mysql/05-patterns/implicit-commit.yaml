title: DDL commits your transaction — whether you like it or not
claim: >-
  Every DDL statement performs an implicit COMMIT of the current transaction
  first: after a mid-transaction CREATE INDEX, the "uncommitted" work is
  permanently committed and a later ROLLBACK undoes nothing.
setup: |
  CREATE TABLE orders (id int PRIMARY KEY, state varchar(10) NOT NULL);
sessions: [A, B]
steps:
  - note: >-
      A migration script wraps its work in a transaction, believing that makes
      it atomic: insert data, add an index, and if anything fails — roll back.
  - A: BEGIN
  - A: INSERT INTO orders VALUES (1, 'draft')
  - B: SELECT count(*) AS visible FROM orders
    expect: [{ visible: 0 }]
    comment: uncommitted, invisible — so far so good

  - A: CREATE INDEX idx_orders_state ON orders (state)
    comment: DDL — and an implicit COMMIT, right here

  - B: SELECT count(*) AS visible FROM orders
    expect: [{ visible: 1 }]
    comment: A never said COMMIT. The CREATE INDEX did.

  - note: >-
      The script now hits an error and rolls back, trusting the transaction to
      clean up:
  - A: ROLLBACK
  - B: SELECT count(*) AS visible FROM orders
    expect: [{ visible: 1 }]
    comment: rolled back nothing — the INSERT was already committed

  - note: >-
      There is no transactional DDL in MySQL. A migration that mixes data and
      schema changes has commit points at every DDL statement — design for
      re-runnability instead of atomicity.
