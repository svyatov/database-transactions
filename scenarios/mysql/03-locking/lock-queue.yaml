title: Waiters pile up — and sys.innodb_lock_waits shows who blocks whom
claim: >-
  Sessions waiting for the same row lock pile up behind the holder, visible live
  in sys.innodb_lock_waits — and every queued update lands once the holder
  commits.
setup: |
  CREATE TABLE accounts (id int PRIMARY KEY, owner varchar(20) NOT NULL, balance int NOT NULL);
  INSERT INTO accounts VALUES (1, 'shared', 100);
sessions: [A, B, C, M]
steps:
  - A: BEGIN
  - A: UPDATE accounts SET balance = balance + 1 WHERE id = 1

  - B: UPDATE accounts SET balance = balance + 10 WHERE id = 1
    blocks: p1

  - note: A fourth session, M, can watch the wait live.
  - M: SELECT waiting_pid, blocking_pid FROM sys.innodb_lock_waits
    expect: [{ waiting_pid: "$pid(B)", blocking_pid: "$pid(A)" }]

  - C: UPDATE accounts SET balance = balance + 100 WHERE id = 1
    blocks: p2

  - note: >-
      A commits — the waiters drain. (InnoDB's CATS scheduler does not promise
      strict FIFO order, but every update lands.)
  - A: COMMIT
  - success: p1
  - success: p2

  - C: SELECT balance FROM accounts WHERE id = 1
    expect: [{ balance: 211 }]
    comment: 100 + 1 + 10 + 100 — nothing was lost in the pile-up
