title: "Deadlock: two transactions, opposite lock order"
claim: >-
  Two transactions locking the same rows in opposite order deadlock; InnoDB
  detects the cycle instantly and rolls back one of them with errno 1213 so the
  other can finish.
setup: |
  CREATE TABLE accounts (id int PRIMARY KEY, owner varchar(20) NOT NULL, balance int NOT NULL);
  INSERT INTO accounts VALUES (1, 'alice', 100), (2, 'bob', 100);
sessions: [A, B]
steps:
  - note: A transfers 10 from alice to bob; B transfers 25 from bob to alice.
  - A: BEGIN
  - A: UPDATE accounts SET balance = balance - 10 WHERE id = 1
    comment: A locks alice

  - B: BEGIN
  - B: UPDATE accounts SET balance = balance - 25 WHERE id = 2
    comment: B locks bob

  - note: A now needs bob's row (B has it) — it waits.
  - A: UPDATE accounts SET balance = balance + 10 WHERE id = 2
    blocks: p1

  - note: "B now needs alice's row (A has it). A waits for B, B waits for A: a cycle."
  - B.fails: UPDATE accounts SET balance = balance + 25 WHERE id = 1
    error: "1213"
    comment: ER_LOCK_DEADLOCK — B's whole transaction is rolled back…

  - note: The victim's abort frees bob's row, so A's stuck UPDATE completes.
  - success: p1
  - A: COMMIT

  - A: SELECT owner, balance FROM accounts ORDER BY id
    expect:
      - { owner: "alice", balance: 90 }
      - { owner: "bob", balance: 110 }
    comment: A's transfer survived; B's evaporated — retry it

  - note: >-
      Note: unlike a lock timeout, a deadlock rolls back B's ENTIRE transaction
      — there is nothing left to ROLLBACK.
