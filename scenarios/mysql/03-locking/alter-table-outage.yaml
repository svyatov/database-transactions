title: The classic migration outage, in four statements
claim: >-
  An ALTER TABLE queued behind one long transaction blocks every later query on
  that table — even plain SELECTs — because they must queue behind its exclusive
  metadata-lock request.
setup: |
  CREATE TABLE accounts (id int PRIMARY KEY, owner varchar(20) NOT NULL, balance int NOT NULL);
  INSERT INTO accounts VALUES (1, 'alice', 100);
sessions: [A, B, C, M]
steps:
  - note: A is any long-lived transaction that has touched the table — a report, a stuck job…
  - A: BEGIN
  - A: SELECT balance FROM accounts WHERE id = 1
    tl: SELECT (a long-lived transaction)

  - note: The migration needs an exclusive metadata lock, so it waits for A. Expected. But now —
  - B: ALTER TABLE accounts ADD COLUMN note varchar(50)
    blocks: p1
    tl: ALTER TABLE … ADD COLUMN

  - note: — every new query on the table queues behind the *waiting* ALTER. This is the outage.
  - C: SELECT balance FROM accounts WHERE id = 1
    blocks: p2
    tl: SELECT — just a read!

  - M: |
      SELECT state, info FROM performance_schema.processlist
      WHERE state = 'Waiting for table metadata lock' ORDER BY info
    expect:
      - { state: "Waiting for table metadata lock", info: "ALTER TABLE accounts ADD COLUMN note varchar(50)" }
      - { state: "Waiting for table metadata lock", info: "SELECT balance FROM accounts WHERE id = 1" }

  - note: Only when A ends does the pile-up drain — migration first, then the reads.
  - A: COMMIT
    tl: COMMIT
  - success: p1
  - success: p2
