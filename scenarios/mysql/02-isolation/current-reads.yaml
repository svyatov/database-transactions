title: Current reads punch holes in the snapshot
claim: >-
  A REPEATABLE READ transaction's UPDATE operates on the CURRENT committed row,
  not on its snapshot — and afterwards the transaction sees its own write, so
  the 'repeatable' read changes.
setup: |
  CREATE TABLE accounts (id int PRIMARY KEY, owner varchar(20) NOT NULL, balance int NOT NULL);
  INSERT INTO accounts VALUES (1, 'alice', 100);
sessions: [A, B]
steps:
  - A: BEGIN
  - A: SELECT balance FROM accounts WHERE id = 1
    expect: [{ balance: 100 }]
    comment: snapshot taken
    tl: SELECT balance → 100 (snapshot)

  - note: B commits a change. A keeps READING its stale snapshot…
  - B: UPDATE accounts SET balance = 150 WHERE id = 1
    tl: UPDATE balance = 150 (committed)

  - A: SELECT balance FROM accounts WHERE id = 1
    expect: [{ balance: 100 }]
    tl: SELECT balance → 100 (snapshot holds)

  - note: >-
      …but A's UPDATE is a current read: it computes from B's committed 150,
      not from the snapshot's 100.
  - A: UPDATE accounts SET balance = balance + 50 WHERE id = 1
    tl: UPDATE +50 (current read of 150)

  - A: SELECT balance FROM accounts WHERE id = 1
    expect: [{ balance: 200 }]
    comment: "150 + 50 — and now A sees it: the snapshot has a hole"
    tl: SELECT balance → 200 (150 + 50 — the hole)

  - A: COMMIT
    tl: COMMIT
  - note: PostgreSQL would have aborted A's UPDATE with 40001 instead. MySQL quietly switches world views.

  - note: If the competing write is NOT yet committed, A first waits on the row lock…
  - A: BEGIN
  - A: SELECT balance FROM accounts WHERE id = 1
    comment: snapshot taken

  - B: BEGIN
  - B: UPDATE accounts SET balance = 300 WHERE id = 1

  - A: UPDATE accounts SET balance = balance + 50 WHERE id = 1
    blocks: p1

  - note: …and proceeds from B's value the moment B commits. No error here either.
  - B: COMMIT

  - success: p1
  - A: SELECT balance FROM accounts WHERE id = 1
    expect: [{ balance: 350 }]
    comment: 300 + 50
  - A: COMMIT
