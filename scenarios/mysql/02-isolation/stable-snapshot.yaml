title: "REPEATABLE READ: one snapshot for the whole transaction"
claim: >-
  At REPEATABLE READ — MySQL's default — plain SELECTs use a single snapshot
  for the entire transaction: no non-repeatable reads and no phantoms.
setup: |
  CREATE TABLE accounts (id int PRIMARY KEY, owner varchar(20) NOT NULL, balance int NOT NULL);
  INSERT INTO accounts VALUES (1, 'alice', 100), (2, 'bob', 50);
sessions: [A, B]
steps:
  - A: BEGIN

  - note: The snapshot is taken by the FIRST query, not by BEGIN.
  - A: SELECT id, balance FROM accounts ORDER BY id
    expect: [{}, {}]

  - note: B changes an existing row AND inserts a new one — both committed instantly.
  - B: UPDATE accounts SET balance = 999 WHERE id = 1
  - B: INSERT INTO accounts VALUES (3, 'carol', 300)

  - A: SELECT id, balance FROM accounts ORDER BY id
    expect:
      - { id: 1, balance: 100 }
      - { id: 2, balance: 50 }
    comment: not 999 — no non-repeatable read; and no carol — no phantom

  - A: COMMIT

  - note: Only a NEW transaction gets a new snapshot.
  - A: SELECT id, balance FROM accounts ORDER BY id
    expect: [{ balance: 999 }, {}, {}]
