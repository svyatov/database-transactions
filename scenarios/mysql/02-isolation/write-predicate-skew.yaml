title: Your DELETE and your SELECT live in different worlds
claim: >-
  Under REPEATABLE READ a write's WHERE clause is evaluated against the
  CURRENT committed data while SELECTs keep showing the snapshot — so a
  transaction can "delete every row matching X", delete nothing, and still
  see rows matching X (Hermitage's G-single write-predicate anomaly).
setup: |
  CREATE TABLE accounts (id int PRIMARY KEY, owner varchar(20) NOT NULL, balance int NOT NULL);
  INSERT INTO accounts VALUES (1, 'alice', 10), (2, 'bob', 20);
sessions: [A, B]
steps:
  - note: A opens a snapshot. B then reshuffles every balance and commits.
  - A: BEGIN
  - A: SELECT id, balance FROM accounts ORDER BY id
    expect: [{ id: 1, balance: 10 }, { id: 2, balance: 20 }]
    comment: snapshot taken
    tl: SELECT → 10, 20 (snapshot)

  - B: BEGIN
  - B: UPDATE accounts SET balance = balance + 5
    tl: +5 to every balance
  - B: COMMIT
    comment: current data is now 15 and 25
    tl: COMMIT (now 15, 25)

  - note: >-
      A closes every account with balance 20 — its snapshot says that's bob.
      But the DELETE is a current read: it scans the committed 15 and 25,
      finds nothing, and deletes nothing.
  - A: DELETE FROM accounts WHERE balance = 20
    affected: 0
    tl: DELETE balance = 20 → 0 rows

  - A: SELECT id, balance FROM accounts WHERE balance = 20 ORDER BY id
    expect: [{ id: 2, balance: 20 }]
    comment: "…yet A still SEES a row with balance 20. Deleted: no such rows. Visible: one."
    tl: SELECT balance = 20 → still sees bob
  - A: COMMIT

  - note: >-
      A's writes ran in one world, its reads in another. PostgreSQL's
      REPEATABLE READ aborts the DELETE with a serialization failure instead;
      on MySQL the cure is a locking read (FOR UPDATE) or SERIALIZABLE.
