title: Circular information flow at READ UNCOMMITTED
claim: >-
  At READ UNCOMMITTED two concurrent transactions can each read the other's
  uncommitted write (Adya's G1c, "circular information flow") — an exchange no
  serial order can explain. READ COMMITTED makes it impossible.
anomaly: G1c
setup: |
  CREATE TABLE accounts (id int PRIMARY KEY, owner varchar(20) NOT NULL, balance int NOT NULL);
  INSERT INTO accounts VALUES (1, 'alice', 100), (2, 'bob', 100);
sessions: [A, B]
steps:
  - note: >-
      A adjusts alice while B adjusts bob — then each peeks at the other's row.
      In any serial order, at most one of them can see the other's write.
  - A: SET SESSION TRANSACTION ISOLATION LEVEL READ UNCOMMITTED
  - B: SET SESSION TRANSACTION ISOLATION LEVEL READ UNCOMMITTED
  - A: BEGIN
  - B: BEGIN
  - A: UPDATE accounts SET balance = 111 WHERE id = 1
    tl: UPDATE alice = 111 (uncommitted)
  - B: UPDATE accounts SET balance = 222 WHERE id = 2
    tl: UPDATE bob = 222 (uncommitted)

  - A: SELECT balance FROM accounts WHERE id = 2
    expect: [{ balance: 222 }]
    comment: A sees B's uncommitted write…
    tl: read bob → 222 (B's uncommitted)
  - B: SELECT balance FROM accounts WHERE id = 1
    expect: [{ balance: 111 }]
    comment: …and B sees A's. Information flowed in a circle.
    tl: read alice → 111 (A's uncommitted)

  - note: >-
      Neither value was committed when it was read — if either side now rolls
      back, the other has computed on data that never existed. Both roll back:
  - A: ROLLBACK
    tl: ROLLBACK
  - B: ROLLBACK
    tl: ROLLBACK

  - note: "The same dance at READ COMMITTED: each sees the world before the other."
  - A: SET SESSION TRANSACTION ISOLATION LEVEL READ COMMITTED
  - B: SET SESSION TRANSACTION ISOLATION LEVEL READ COMMITTED
  - A: BEGIN
  - B: BEGIN
  - A: UPDATE accounts SET balance = 111 WHERE id = 1
  - B: UPDATE accounts SET balance = 222 WHERE id = 2
  - A: SELECT balance FROM accounts WHERE id = 2
    expect: [{ balance: 100 }]
  - B: SELECT balance FROM accounts WHERE id = 1
    expect: [{ balance: 100 }]
  - A: COMMIT
  - B: COMMIT
