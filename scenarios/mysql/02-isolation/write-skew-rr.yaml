title: "Write skew: REPEATABLE READ is not enough"
claim: >-
  Two REPEATABLE READ transactions can each validate an invariant against
  their snapshots, write to different rows, and both commit — leaving the
  invariant broken. This is write skew.
setup: |
  CREATE TABLE doctors (name varchar(20) PRIMARY KEY, on_call boolean NOT NULL);
  INSERT INTO doctors VALUES ('alice', true), ('bob', true);
sessions: [A, B]
steps:
  - note: >-
      Hospital rule: at least one doctor must stay on call. Alice and Bob both
      want the night off.
  - A: BEGIN
  - B: BEGIN

  - A: SELECT count(*) AS on_call FROM doctors WHERE on_call
    expect: [{ on_call: 2 }]
    comment: '"two of us — safe for me to leave"'
    tl: on-call count → 2

  - B: SELECT count(*) AS on_call FROM doctors WHERE on_call
    expect: [{ on_call: 2 }]
    comment: '"two of us — safe for me to leave"'
    tl: on-call count → 2

  - note: Each updates a DIFFERENT row, so there is no write-write conflict to detect.
  - A: UPDATE doctors SET on_call = false WHERE name = 'alice'
    tl: alice off call
  - B: UPDATE doctors SET on_call = false WHERE name = 'bob'
    tl: bob off call

  - A: COMMIT
    tl: COMMIT
  - B: COMMIT
    comment: both succeed!
    tl: COMMIT (both succeed)

  - A: SELECT count(*) AS on_call FROM doctors WHERE on_call
    expect: [{ on_call: 0 }]
    comment: nobody is on call — the invariant is broken
    tl: on-call count → 0 — invariant broken

  - note: >-
      Each transaction was internally consistent; together they broke the
      rule. Only SERIALIZABLE catches this.
