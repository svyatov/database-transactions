title: READ UNCOMMITTED really reads uncommitted data
claim: >-
  At READ UNCOMMITTED, MySQL serves other transactions' uncommitted changes —
  including values that are later rolled back and thus never existed.
setup: |
  CREATE TABLE accounts (id int PRIMARY KEY, owner varchar(20) NOT NULL, balance int NOT NULL);
  INSERT INTO accounts VALUES (1, 'alice', 100);
sessions: [A, B]
steps:
  - A: BEGIN
  - A: UPDATE accounts SET balance = 999 WHERE id = 1
    tl: UPDATE balance = 999 (uncommitted)

  - note: B opts into READ UNCOMMITTED — and sees A's uncommitted 999.
  - B: SET SESSION TRANSACTION ISOLATION LEVEL READ UNCOMMITTED
  - B: BEGIN

  - B: SELECT @@transaction_isolation AS isolation
    expect: [{ isolation: "READ-UNCOMMITTED" }]

  - B: SELECT balance FROM accounts WHERE id = 1
    expect: [{ balance: 999 }]
    comment: a dirty read — A never committed this
    tl: SELECT balance → 999 (dirty read)

  - note: A rolls back. The 999 B just read never existed.
  - A: ROLLBACK
    tl: ROLLBACK — 999 never existed

  - B: SELECT balance FROM accounts WHERE id = 1
    expect: [{ balance: 100 }]
    tl: SELECT balance → 100 (the real value)
  - B: COMMIT
